<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewash Process Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: 'Space Mono', monospace;
            color: #fff;
            padding: 24px;
        }

        .header {
            margin-bottom: 32px;
            border-bottom: 2px solid #404040;
            padding-bottom: 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            margin: 0;
            color: #888;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .add-btn {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .stages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stage-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }

        .stage-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
        }

        .stage-icon {
            font-size: 28px;
            line-height: 1;
        }

        .stage-info {
            flex: 1;
        }

        .stage-name {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .stage-number {
            margin: 4px 0 0 0;
            font-size: 12px;
            color: #666;
            letter-spacing: 1px;
        }

        .stage-count {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
        }

        .batches-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .empty-state {
            padding: 32px 16px;
            text-align: center;
            color: #555;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .batch-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 14px;
            transition: all 0.2s;
        }

        .batch-card:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .batch-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .batch-name {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .batch-time {
            font-size: 11px;
            color: #666;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .batch-actions {
            display: flex;
            gap: 6px;
        }

        .btn {
            padding: 6px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            border: none;
        }

        .btn-back {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-next {
            flex: 1;
            font-weight: 600;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 6px 10px;
            color: #EF4444;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            margin: 0 0 24px 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            font-family: 'Space Mono', monospace;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus, .form-select:focus {
            border-color: #3B82F6;
            background: rgba(255, 255, 255, 0.08);
        }

        .form-select option {
            background: #1a1a1a;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-submit {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .btn-submit:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-submit:disabled:hover {
            transform: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <h1>REWASH PROCESS TRACKER</h1>
                <p id="batch-count">0 ACTIVE BATCHES</p>
            </div>
            <button class="add-btn" onclick="openModal()">+ NEW BATCH</button>
        </div>
    </div>

    <div class="stages-grid" id="stages-grid"></div>

    <!-- Add Batch Modal -->
    <div class="modal" id="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>ADD NEW BATCH</h2>
            <div class="form-group">
                <label class="form-label">Lot No</label>
                <input 
                    type="text" 
                    class="form-input" 
                    id="lot-no" 
                    placeholder="e.g., LOT-2024-001"
                    oninput="updateSubmitButton()"
                >
            </div>
            <div class="form-group">
                <label class="form-label">PCS (Pieces)</label>
                <input 
                    type="number" 
                    class="form-input" 
                    id="pcs" 
                    placeholder="e.g., 1000"
                    min="0"
                    oninput="updateSubmitButton()"
                >
            </div>
            <div class="form-group">
                <label class="form-label">MTR (Meters)</label>
                <input 
                    type="number" 
                    class="form-input" 
                    id="mtr" 
                    placeholder="e.g., 5000"
                    min="0"
                    step="0.01"
                    oninput="updateSubmitButton()"
                >
            </div>
            <div class="form-group">
                <label class="form-label">Starting Stage</label>
                <select class="form-select" id="stage-select"></select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
                <button class="btn-submit" id="submit-btn" onclick="addBatch()">ADD BATCH</button>
            </div>
        </div>
    </div>

    <script>
        const stages = [
            { id: 'grey', name: 'GREY', icon: '🧵', color: '#6B7280' },
            { id: 'jigger', name: 'JIGGER', icon: '🔄', color: '#3B82F6' },
            { id: 'dr', name: 'DR', icon: '💧', color: '#8B5CF6' },
            { id: 'chamber', name: 'CHAMBER', icon: '🔥', color: '#EF4444' },
            { id: 'stentering', name: 'STENTERING', icon: '↔️', color: '#F59E0B' },
            { id: 'finishing', name: 'FINISHING', icon: '✨', color: '#10B981' },
            { id: 'delivery', name: 'DELIVERY', icon: '📦', color: '#06B6D4' }
        ];

        let batches = [];

        // Load batches from localStorage
        function loadBatches() {
            const stored = localStorage.getItem('rewash-batches');
            if (stored) {
                batches = JSON.parse(stored);
            }
            renderStages();
        }

        // Save batches to localStorage
        function saveBatches() {
            localStorage.setItem('rewash-batches', JSON.stringify(batches));
            renderStages();
        }

        // Initialize stage select options
        function initStageSelect() {
            const select = document.getElementById('stage-select');
            select.innerHTML = stages.map(stage => 
                `<option value="${stage.id}">${stage.icon} ${stage.name}</option>`
            ).join('');
        }

        // Render all stages
        function renderStages() {
            const grid = document.getElementById('stages-grid');
            grid.innerHTML = stages.map((stage, index) => {
                const stageBatches = batches.filter(b => b.stage === stage.id);
                return `
                    <div class="stage-card">
                        <div class="stage-header" style="border-bottom: 2px solid ${stage.color}">
                            <div class="stage-icon">${stage.icon}</div>
                            <div class="stage-info">
                                <h3 class="stage-name" style="color: ${stage.color}">${stage.name}</h3>
                                <p class="stage-number">STAGE ${index + 1}/${stages.length}</p>
                            </div>
                            <div class="stage-count" style="background: ${stage.color}22; color: ${stage.color}">
                                ${stageBatches.length}
                            </div>
                        </div>
                        <div class="batches-container">
                            ${stageBatches.length === 0 ? 
                                '<div class="empty-state">NO BATCHES</div>' :
                                stageBatches.map(batch => renderBatch(batch, stage)).join('')
                            }
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('batch-count').textContent = `${batches.length} ACTIVE BATCHES`;
        }

        // Render single batch
        function renderBatch(batch, stage) {
            const stageIndex = stages.findIndex(s => s.id === batch.stage);
            const canMoveBack = stageIndex > 0;
            const canMoveNext = stageIndex < stages.length - 1;
            const updatedDate = new Date(batch.updatedAt).toLocaleString('en-IN', {
                day: '2-digit',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
            });

            return `
                <div class="batch-card">
                    <div class="batch-header">
                        <div style="color: ${stage.color}">📦</div>
                        <div class="batch-name">${batch.lotNo}</div>
                    </div>
                    <div style="display: flex; gap: 16px; margin-bottom: 10px; font-size: 12px; color: #aaa;">
                        <div><strong>PCS:</strong> ${batch.pcs.toLocaleString()}</div>
                        <div><strong>MTR:</strong> ${batch.mtr.toLocaleString()}</div>
                    </div>
                    <div class="batch-time">Updated: ${updatedDate}</div>
                    <div class="batch-actions">
                        ${canMoveBack ? `
                            <button class="btn btn-back" onclick="moveBatch('${batch.id}', -1)">
                                ← BACK
                            </button>
                        ` : ''}
                        ${canMoveNext ? `
                            <button class="btn btn-next" 
                                style="background: ${stage.color}33; border: 1px solid ${stage.color}; color: ${stage.color}"
                                onmouseover="this.style.background='${stage.color}55'"
                                onmouseout="this.style.background='${stage.color}33'"
                                onclick="moveBatch('${batch.id}', 1)">
                                NEXT →
                            </button>
                        ` : ''}
                        <button class="btn btn-delete" onclick="deleteBatch('${batch.id}')">
                            ✕
                        </button>
                    </div>
                </div>
            `;
        }

        // Open modal
        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.getElementById('lot-no').value = '';
            document.getElementById('pcs').value = '';
            document.getElementById('mtr').value = '';
            document.getElementById('lot-no').focus();
            updateSubmitButton();
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Update submit button state
        function updateSubmitButton() {
            const lotNo = document.getElementById('lot-no').value.trim();
            const pcs = document.getElementById('pcs').value.trim();
            const mtr = document.getElementById('mtr').value.trim();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = !(lotNo && pcs && mtr);
        }

        // Add new batch
        function addBatch() {
            const lotNo = document.getElementById('lot-no').value.trim();
            const pcs = document.getElementById('pcs').value.trim();
            const mtr = document.getElementById('mtr').value.trim();
            
            if (!lotNo || !pcs || !mtr) return;

            const newBatch = {
                id: Date.now().toString(),
                lotNo: lotNo,
                pcs: parseFloat(pcs),
                mtr: parseFloat(mtr),
                stage: document.getElementById('stage-select').value,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            batches.push(newBatch);
            saveBatches();
            closeModal();
        }

        // Move batch
        function moveBatch(batchId, direction) {
            const batch = batches.find(b => b.id === batchId);
            if (!batch) return;

            const currentIndex = stages.findIndex(s => s.id === batch.stage);
            const newIndex = currentIndex + direction;

            if (newIndex >= 0 && newIndex < stages.length) {
                batch.stage = stages[newIndex].id;
                batch.updatedAt = new Date().toISOString();
                saveBatches();
            }
        }

        // Delete batch
        function deleteBatch(batchId) {
            if (confirm('Are you sure you want to delete this batch?')) {
                batches = batches.filter(b => b.id !== batchId);
                saveBatches();
            }
        }

        // Close modal when clicking outside
        document.getElementById('modal').addEventListener('click', closeModal);

        // Initialize
        initStageSelect();
        loadBatches();
    </script>
</body>
</html>
